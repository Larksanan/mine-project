services:
  mongo:
    image: mongo:6
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  nextjs:
    build: .
    expose:
      - '3000'
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/mini-project

  nginx:
    image: nginx:stable-alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nextjs

volumes:
  mongo-data:
